services:
  jellyfin:
    image: %image%:%version%
    container_name: atoile-app_jellyfin
    ports:
      - 8095:8096/tcp
      - 7359:7359/udp
    volumes:
      - /atoile/apps/jellyfin/config:/config
      - /atoile/apps/jellyfin/cache:/cache
      # Storage volumes loaded into Atoile
      # %storage_volumes%
    restart: 'unless-stopped'
    # Optional - alternative address used for autodiscovery
    # environment:
    #  - JELLYFIN_PublishedServerUrl=jellyfin.local
    extra_hosts:
      - 'host.docker.internal:host-gateway'